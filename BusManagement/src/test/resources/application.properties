# ============================================================================
# CẤU HÌNH DÀNH RIÊNG CHO TEST
# ----------------------------------------------------------------------------
# File này SHADOW hoàn toàn src/main/resources/application.properties khi chạy
# test (classpath test được ưu tiên, KHÔNG merge 2 file) — nên mọi thuộc tính
# cần thiết phải được khai báo lại đầy đủ ở đây.
#
# Mục đích: cách ly test khỏi database thật.
# Trước đây không có file này → `mvnw test` dùng luôn cấu hình của app, tức là
# mỗi lần chạy test là database busmanagement bị drop + seed lại. Sau khi dữ
# liệu lịch sử được tích lũy (THESIS_ROADMAP.md, Phase 5), chỉ cần chạy test
# một lần là mất trắng dataset.
#
# createDatabaseIfNotExist=true : MySQL Connector/J tự tạo database
# busmanagement_test nếu chưa có → không cần bước CREATE DATABASE thủ công.
#
# DataInitializer KHÔNG chạy ở đây vì nó mang @Profile("demo"), còn test không
# kích hoạt profile nào → DB test luôn sạch, không có dữ liệu seed.
# ============================================================================
spring.application.name=BusManagement

spring.jpa.hibernate.ddl-auto=create-drop
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/busmanagement_test?createDatabaseIfNotExist=true&sessionVariables=foreign_key_checks=0
spring.datasource.username=root
spring.datasource.password=giangmysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=false

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
