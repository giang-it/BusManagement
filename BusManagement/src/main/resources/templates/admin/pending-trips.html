<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>AI Suggestions</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="container mt-5">
    <h2 class="mb-4">AI Suggestions (High Demand)</h2>

    <div th:if="${param.success}" class="alert alert-success">Phê duyệt chuyến xe thành công!</div>

    <table class="table table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tuyến đường</th>
                <th>Khởi hành</th>
                <th>Chuyến gốc (ID)</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="trip : ${pendingTrips}">
                <td th:text="${trip.id}"></td>
                <td th:text="${trip.route.departurePoint + ' - ' + trip.route.destinationPoint}"></td>
                <td th:text="${#temporals.format(trip.departureTime, 'dd-MM-yyyy HH:mm')}"></td>
                <td th:text="${trip.originalTrip.id}"></td>
                <td>
                    <a th:href="@{/admin/trips/approve/{id}(id=${trip.id})}" class="btn btn-primary btn-sm">Duyệt & Gán
                        Xe</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
