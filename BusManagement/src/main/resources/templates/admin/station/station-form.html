<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cấu Hình Bến Xe / Trạm Dừng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-success text-white py-3">
                        <h4 class="card-title mb-0"><i class="bi bi-geo-alt"></i> Thông Tin Bến Xe / Trạm Dừng</h4>
                    </div>
                    <div class="card-body p-4">
                        <form
                            th:action="${station.id == null} ? @{/admin/stations/create} : @{/admin/stations/edit/{id}(id=${station.id})}"
                            th:object="${station}" method="post" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Tên Bến Xe / Trạm Dừng <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{stationName}" required
                                    placeholder="Ví dụ: Bến xe Miền Tây">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Địa Chỉ Chi Tiết <span
                                        class="text-danger">*</span></label>
                                <textarea class="form-control" th:field="*{address}" rows="4" required
                                    placeholder="Nhập địa chỉ chính xác..."></textarea>
                            </div>
                            <div class="d-flex justify-content-end mt-4">
                                <a href="/admin/stations" class="btn btn-outline-secondary me-2">Hủy Bỏ</a>
                                <button type="submit" class="btn btn-success px-4"><i class="bi bi-save"></i> Lưu
                                    Lại</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        (() => {
            'use strict';
            const forms = document.querySelectorAll('.needs-validation');
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) { event.preventDefault(); event.stopPropagation(); }
                    form.classList.add('was-validated');
                }, false);
            });
        })();
    </script>
</body>

</html>
