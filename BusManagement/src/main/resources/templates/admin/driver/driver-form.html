<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Hồ Sơ Tài Xế</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-dark text-white py-3">
                        <h4 class="card-title mb-0">
                            <i class="bi bi-person-badge"></i>
                            <span th:text="${driver.userId == null} ? 'Thêm Tài Xế Mới' : 'Sửa Hồ Sơ Tài Xế'"></span>
                        </h4>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${error}" class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
                        </div>

                        <form
                            th:action="${driver.userId == null} ? @{/admin/drivers/create} : @{/admin/drivers/edit/{id}(id=${driver.userId})}"
                            method="post" class="needs-validation" novalidate>

                            <h5 class="text-muted mb-3"><i class="bi bi-person-circle"></i> Thông Tin Tài Khoản</h5>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Tên Đăng Nhập <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" name="username"
                                        th:value="${user.username}" required placeholder="vd: tx_nguyenvana">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">
                                        Mật Khẩu
                                        <span class="text-danger" th:if="${driver.userId == null}">*</span>
                                    </label>
                                    <!-- Tạo mới: field 'password' bind thẳng vào User.password.
                                         Sửa: dùng field riêng 'rawPassword' để phân biệt "không đổi mật khẩu"
                                         (bỏ trống) với "đặt mật khẩu mới" — nếu bind vào User.password,
                                         bỏ trống sẽ ghi đè mật khẩu cũ thành rỗng. -->
                                    <input th:if="${driver.userId == null}" type="password" class="form-control"
                                        name="password" required>
                                    <input th:unless="${driver.userId == null}" type="password" class="form-control"
                                        name="rawPassword" placeholder="Để trống nếu không đổi">
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-semibold">Họ và Tên <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" name="fullName" th:value="${user.fullName}"
                                        required placeholder="Nguyễn Văn A">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Số Điện Thoại</label>
                                    <input type="text" class="form-control" name="phone" th:value="${user.phone}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" name="email" th:value="${user.email}">
                                    <div class="form-text text-muted">Có thể bỏ trống.</div>
                                </div>
                            </div>

                            <hr class="my-4">
                            <h5 class="text-muted mb-3"><i class="bi bi-card-checklist"></i> Hồ Sơ Nghề Nghiệp</h5>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Số Bằng Lái <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control text-uppercase" name="licenseNumber"
                                        th:value="${driver.licenseNumber}" required placeholder="vd: B2-001">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Hạn Bằng Lái <span
                                            class="text-danger">*</span></label>
                                    <input type="date" class="form-control" name="licenseExpiryDate"
                                        th:value="${driver.licenseExpiryDate}" required>
                                    <div class="form-text text-muted">
                                        ℹ️ Bằng hết hạn sẽ bị hệ thống loại khỏi mọi phân công chuyến.
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Số Năm Kinh Nghiệm</label>
                                    <input type="number" min="0" class="form-control" name="experienceYears"
                                        th:value="${driver.experienceYears}">
                                </div>
                                <div class="col-md-6 d-flex align-items-center">
                                    <div class="form-check form-switch mt-4">
                                        <!-- '_isActive' là field marker của Spring WebDataBinder: khi checkbox
                                             không được tick, trình duyệt không gửi 'isActive', binder thấy marker
                                             và tự set false. Không có marker này, giá trị mặc định true của
                                             entity sẽ được giữ nguyên và việc bỏ tick sẽ không có tác dụng. -->
                                        <input type="hidden" name="_isActive" value="on">
                                        <input class="form-check-input" type="checkbox" name="isActive" value="true"
                                            id="isActive" th:checked="${driver.userId == null} ? true : ${driver.isActive}">
                                        <label class="form-check-label fw-semibold" for="isActive">Đang hoạt động</label>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex justify-content-end mt-4">
                                <a href="/admin/drivers" class="btn btn-outline-secondary me-2">Hủy Bỏ</a>
                                <button type="submit" class="btn btn-dark px-4"><i class="bi bi-save"></i> Lưu Tài
                                    Xế</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        (() => {
            'use strict';
            const forms = document.querySelectorAll('.needs-validation');
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) { event.preventDefault(); event.stopPropagation(); }
                    form.classList.add('was-validated');
                }, false);
            });
        })();
    </script>
</body>

</html>
