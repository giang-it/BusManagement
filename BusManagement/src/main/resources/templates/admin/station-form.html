<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Trạm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="fas fa-map-marker-alt"></i>
                <span th:text="${station.id != null ? 'Sửa trạm' : 'Thêm trạm mới'}"></span>
            </span>
            <a href="/admin/master-data/stations" class="btn btn-outline-light btn-sm">
                <i class="fas fa-arrow-left"></i> Quay lại
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">
                            <i class="fas fa-edit"></i> Thông tin trạm
                        </h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/master-data/stations/save}" th:object="${station}" method="post">
                            <input type="hidden" th:field="*{id}">

                            <!-- Tên trạm -->
                            <div class="mb-3">
                                <label class="form-label">
                                    <i class="fas fa-tag"></i> Tên trạm <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" th:field="*{stationName}" required
                                    placeholder="VD: Bến xe Mỹ Đình">
                                <div class="form-text">Tên đầy đủ của trạm/bến xe</div>
                            </div>

                            <!-- Địa chỉ -->
                            <div class="mb-3">
                                <label class="form-label">
                                    <i class="fas fa-map-marker-alt"></i> Địa chỉ <span class="text-danger">*</span>
                                </label>
                                <textarea class="form-control" th:field="*{address}" rows="3" required
                                    placeholder="Số nhà, đường, quận/huyện, tỉnh/thành phố"></textarea>
                                <div class="form-text">Địa chỉ chi tiết của trạm</div>
                            </div>

                            <!-- Gợi ý -->
                            <div class="alert alert-info">
                                <h6><i class="fas fa-lightbulb"></i> Gợi ý:</h6>
                                <ul class="mb-0">
                                    <li>Tên trạm nên ngắn gọn, dễ nhớ</li>
                                    <li>Địa chỉ nên đầy đủ để khách hàng dễ tìm kiếm</li>
                                    <li>Sau khi tạo trạm, bạn có thể gán trạm vào các tuyến đường</li>
                                </ul>
                            </div>

                            <div class="d-flex justify-content-between mt-4">
                                <a href="/admin/master-data/stations" class="btn btn-secondary">
                                    <i class="fas fa-times"></i> Hủy
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> Lưu
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
