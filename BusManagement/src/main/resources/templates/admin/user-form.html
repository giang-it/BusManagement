<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Tạo Người Dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="col-md-8 mx-auto">
            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0">👤 Thêm Tài Khoản Mới</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/users/save}" th:object="${user}" method="post">
                        <div class="mb-3">
                            <label class="form-label font-weight-bold">Tên đăng nhập</label>
                            <input type="text" th:field="*{username}" class="form-control" placeholder="username..."
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" th:field="*{password}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" th:field="*{fullName}" class="form-control" placeholder="Nguyễn Văn A">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Số điện thoại</label>
                                <input type="text" th:field="*{phone}" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Vai trò (Role)</label>
                                <select th:field="*{role}" class="form-select">
                                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="mt-4 text-end">
                            <a href="/admin/dashboard" class="btn btn-secondary">Quay lại</a>
                            <button type="submit" class="btn btn-primary px-5">Tạo tài khoản</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
