<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Bus Management - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🚌 BusManager Admin</span>
        </div>
    </nav>

    <div class="container">
        <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show">
            Thao tác thành công!
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card bg-primary text-white shadow">
                    <div class="card-body">
                        <h5><i class="bi bi-people"></i> Người dùng</h5>
                        <h2 th:text="${totalUsers}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-success text-white shadow">
                    <div class="card-body">
                        <h5><i class="bi bi-bus-front"></i> Tổng số xe</h5>
                        <h2 th:text="${totalBuses}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-warning text-dark shadow">
                    <div class="card-body">
                        <h5><i class="bi bi-exclamation-triangle"></i> Đề xuất AI</h5>
                        <h2 th:text="${pendingTrips}">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow border-0">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-primary font-weight-bold">Bảng điều khiển chức năng</h5>
            </div>
            <div class="card-body">
                <div class="row text-center">
                    <div class="col-md-4 mb-3">
                        <a th:href="@{/admin/users/new}" class="btn btn-outline-primary btn-lg w-100 py-4">
                            <i class="bi bi-person-plus fs-1"></i><br>Tạo Người Dùng
                        </a>
                    </div>
                    <div class="col-md-4 mb-3">
                        <a th:href="@{/admin/buses/new}" class="btn btn-outline-success btn-lg w-100 py-4">
                            <i class="bi bi-truck fs-1"></i><br>Tạo Xe Mới
                        </a>
                    </div>
                    <div class="col-md-4 mb-3">
                        <a href="#" class="btn btn-outline-info btn-lg w-100 py-4">
                            <i class="bi bi-calendar-event fs-1"></i><br>Quản lý Chuyến
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
