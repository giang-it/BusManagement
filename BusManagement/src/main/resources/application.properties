spring.application.name=BusManagement

# ============================================================================
# CHÍNH SÁCH SCHEMA & DỮ LIỆU
# ----------------------------------------------------------------------------
# MẶC ĐỊNH = PERSIST: dữ liệu được GIỮ NGUYÊN qua mỗi lần khởi động.
#   - ddl-auto=update: Hibernate chỉ bổ sung schema còn thiếu, KHÔNG drop bảng.
#   - DataInitializer (@Profile("demo")) KHÔNG chạy → không có deleteAll().
#
# Muốn WIPE + seed lại dữ liệu mẫu, phải kích hoạt profile "demo" tường minh:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=demo
#
# Việc đảo mặc định sang persist là có chủ đích: dữ liệu lịch sử là nền bắt buộc
# cho các module phân tích/dự báo (xem docs/development/THESIS_ROADMAP.md,
# Phase 5-7). Nếu wipe là mặc định, chỉ cần một lần restart quên cờ là mất sạch
# dataset mà hệ thống không báo lỗi gì.
# ============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/busmanagement?sessionVariables=foreign_key_checks=0
spring.datasource.username=root
spring.datasource.password=giangmysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql: false


#config spring security
spring.security.user.name=a
spring.security.user.password=a
# Cách này sẽ vô hiệu hóa hoàn toàn security (tùy version Spring Boot)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
