# ============================================================================
# PROFILE: demo
# ----------------------------------------------------------------------------
# Dựng lại môi trường trình diễn SẠCH từ đầu:
#   - ddl-auto=create-drop : drop + tạo lại toàn bộ schema mỗi lần khởi động.
#   - DataInitializer      : bean này mang @Profile("demo") nên chỉ chạy ở đây —
#                            nó deleteAll() rồi seed lại bộ dữ liệu mẫu (xe, tài
#                            xế, tuyến, chuyến ACTIVE cho kịch bản gợi ý chuyến
#                            tăng cường).
#
# ⚠️ CẢNH BÁO: profile này XÓA SẠCH database busmanagement. Không dùng khi trong
# DB đang có dữ liệu lịch sử cần giữ (xem docs/development/THESIS_ROADMAP.md).
#
# Cách chạy:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=demo
#
# Các thuộc tính khác (datasource, security) kế thừa từ application.properties.
# ============================================================================
spring.jpa.hibernate.ddl-auto=create-drop
